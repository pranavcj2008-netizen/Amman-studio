services:
  - type: web
    name: amman-studio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amman-studio-db
          property: connectionString

databases:
  - name: amman-studio-db
    plan: free
