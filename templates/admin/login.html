<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login - Amman Studio</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#080b14;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 30%,rgba(124,58,237,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,0.07) 0%,transparent 60%);pointer-events:none;}
  .login-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border-radius:24px;padding:50px 40px;width:100%;max-width:420px;border:1px solid rgba(124,58,237,0.2);box-shadow:0 40px 100px rgba(0,0,0,0.5);position:relative;z-index:1;animation:fadeUp 0.6s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .login-logo{text-align:center;margin-bottom:32px;}
  .login-logo a{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
  .login-logo p{color:#64748b;font-size:0.88rem;margin-top:6px;}
  .form-group{margin-bottom:20px;}
  .form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:0.88rem;color:#94a3b8;}
  .input-wrap{position:relative;}
  .input-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#64748b;}
  .form-group input{width:100%;padding:14px 18px 14px 44px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;color:#f1f5f9;font-family:'Inter',sans-serif;font-size:0.95rem;transition:all 0.3s;}
  .form-group input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,0.15);}
  .login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:white;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;}
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(124,58,237,0.4);}
  .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:0.88rem;}
  .back-link{text-align:center;margin-top:20px;}
  .back-link a{color:#64748b;font-size:0.85rem;text-decoration:none;transition:color 0.3s;}
  .back-link a:hover{color:#a78bfa;}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <a href="/">AmmanStudio</a>
    <p>Admin Panel Login</p>
  </div>
  {% if error %}<div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap"><i class="fas fa-user"></i><input name="username" placeholder="Enter username" required></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap"><i class="fas fa-lock"></i><input name="password" type="password" placeholder="Enter password" required></div>
    </div>
    <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login to Admin</button>
  </form>
  <div class="back-link"><a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a></div>
</div>
</body>
</html>
