<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login - Amman Studio</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:#0d0d0d; color:#e0e0e0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-bg { position:fixed; inset:0; background:radial-gradient(ellipse at center, rgba(255,107,53,0.1) 0%, transparent 60%); }
  .login-card { background:#1a1a1a; border-radius:24px; padding:50px 40px; width:100%; max-width:420px; border:1px solid rgba(255,107,53,0.2); box-shadow:0 40px 100px rgba(0,0,0,0.5); position:relative; z-index:1; animation:fadeUp 0.6s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .login-logo { text-align:center; margin-bottom:30px; }
  .login-logo a { font-size:2rem; font-weight:800; color:#ff6b35; text-decoration:none; }
  .login-logo a span { color:white; }
  .login-logo p { color:#888; font-size:0.9rem; margin-top:6px; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; margin-bottom:8px; font-weight:600; font-size:0.9rem; }
  .input-wrap { position:relative; }
  .input-wrap i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#666; }
  .form-group input { width:100%; padding:14px 18px 14px 44px; background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.08); border-radius:12px; color:#e0e0e0; font-family:'Poppins',sans-serif; font-size:0.95rem; transition:all 0.3s; }
  .form-group input:focus { outline:none; border-color:#ff6b35; box-shadow:0 0 0 4px rgba(255,107,53,0.1); }
  .login-btn { width:100%; padding:15px; background:linear-gradient(135deg,#ff6b35,#e55a25); color:white; border:none; border-radius:12px; font-family:'Poppins',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.3s; }
  .login-btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,107,53,0.4); }
  .error { background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.3); color:#ff4444; padding:12px 16px; border-radius:10px; margin-bottom:20px; font-size:0.9rem; }
  .back-link { text-align:center; margin-top:20px; }
  .back-link a { color:#888; font-size:0.85rem; text-decoration:none; }
  .back-link a:hover { color:#ff6b35; }
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-card">
  <div class="login-logo">
    <a href="/">Amman<span>Studio</span></a>
    <p>Admin Panel Login</p>
  </div>
  {% if error %}<div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap"><i class="fas fa-user"></i><input name="username" placeholder="Enter username" required></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap"><i class="fas fa-lock"></i><input name="password" type="password" placeholder="Enter password" required></div>
    </div>
    <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login to Admin</button>
  </form>
  <div class="back-link"><a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a></div>
</div>
</body>
</html>
