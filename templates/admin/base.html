<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}Admin{% endblock %} - Amman Studio</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --primary:#7c3aed;--primary-light:#a78bfa;--accent2:#06b6d4;
    --gradient:linear-gradient(135deg,#7c3aed,#06b6d4);
    --dark:#080b14;--darker:#04060d;--sidebar:#0c0f1d;
    --card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.07);
    --text:#f1f5f9;--muted:#64748b;--muted2:#94a3b8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{width:260px;background:var(--sidebar);min-height:100vh;position:fixed;left:0;top:0;border-right:1px solid var(--card-border);display:flex;flex-direction:column;z-index:100;}
  .sidebar-logo{padding:28px 24px;border-bottom:1px solid var(--card-border);}
  .sidebar-logo a{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
  .sidebar-logo p{color:var(--muted);font-size:0.75rem;margin-top:4px;}
  .sidebar-nav{padding:20px 0;flex:1;}
  .nav-section{padding:8px 24px;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:16px;}
  .sidebar-nav a{display:flex;align-items:center;gap:14px;padding:13px 24px;color:var(--muted2);text-decoration:none;font-size:0.88rem;font-weight:500;transition:all 0.3s;position:relative;}
  .sidebar-nav a:hover,.sidebar-nav a.active{color:white;background:rgba(124,58,237,0.12);}
  .sidebar-nav a.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:0 3px 3px 0;}
  .sidebar-nav a i{width:20px;text-align:center;color:var(--muted);}
  .sidebar-nav a:hover i,.sidebar-nav a.active i{color:var(--primary-light);}
  .badge{background:var(--primary);color:white;font-size:0.7rem;padding:2px 8px;border-radius:50px;margin-left:auto;font-weight:700;}
  .sidebar-footer{padding:20px 24px;border-top:1px solid var(--card-border);}
  .sidebar-footer a{display:flex;align-items:center;gap:10px;color:var(--muted);text-decoration:none;font-size:0.85rem;transition:color 0.3s;}
  .sidebar-footer a:hover{color:#ef4444;}

  /* Main */
  .main{margin-left:260px;flex:1;min-height:100vh;}
  .topbar{background:rgba(8,11,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .admin-badge{background:rgba(124,58,237,0.15);color:var(--primary-light);padding:8px 16px;border-radius:50px;font-size:0.82rem;font-weight:600;border:1px solid rgba(124,58,237,0.2);}
  .content{padding:32px;}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-bottom:32px;}
  .stat-card{background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--card-border);transition:all 0.3s;}
  .stat-card:hover{transform:translateY(-4px);border-color:rgba(124,58,237,0.3);box-shadow:0 10px 40px rgba(0,0,0,0.3);}
  .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:16px;}
  .stat-num{font-size:2.2rem;font-weight:800;color:white;}
  .stat-label{color:var(--muted);font-size:0.85rem;margin-top:4px;}

  /* Table */
  .table-card{background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--card-border);}
  .table-header{padding:20px 28px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;}
  .table-header h3{font-size:1.05rem;font-weight:700;}
  table{width:100%;border-collapse:collapse;}
  th{padding:14px 20px;text-align:left;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--card-border);background:rgba(255,255,255,0.02);}
  td{padding:16px 20px;font-size:0.88rem;border-bottom:1px solid rgba(255,255,255,0.03);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(124,58,237,0.04);}

  /* Status badges */
  .status{padding:4px 12px;border-radius:6px;font-size:0.75rem;font-weight:600;}
  .status.pending{background:rgba(245,158,11,0.15);color:#f59e0b;}
  .status.confirmed{background:rgba(16,185,129,0.15);color:#10b981;}
  .status.completed{background:rgba(6,182,212,0.15);color:#06b6d4;}
  .status.cancelled{background:rgba(239,68,68,0.15);color:#ef4444;}
  .status.paid{background:rgba(124,58,237,0.15);color:#a78bfa;}

  /* Forms */
  .form-card{background:var(--card);border-radius:20px;padding:32px;border:1px solid var(--card-border);margin-bottom:24px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .form-group{margin-bottom:16px;}
  .form-group.full{grid-column:1/-1;}
  .form-group label{display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:var(--muted2);}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);
    border:1px solid var(--card-border);border-radius:10px;color:var(--text);
    font-family:'Inter',sans-serif;font-size:0.9rem;transition:all 0.3s;
  }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
    outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,0.15);
  }
  .form-group select option{background:#0c0f1d;}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:10px;font-weight:600;font-size:0.85rem;cursor:pointer;border:none;text-decoration:none;transition:all 0.3s;font-family:'Inter',sans-serif;}
  .btn-primary{background:var(--gradient);color:white;box-shadow:0 4px 15px rgba(124,58,237,0.3);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(124,58,237,0.5);}
  .btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;}
  .btn-danger:hover{background:#ef4444;color:white;}
  .btn-success{background:rgba(16,185,129,0.15);color:#10b981;}
  .btn-success:hover{background:#10b981;color:white;}
  .btn-sm{padding:6px 14px;font-size:0.78rem;}

  @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.form-grid{grid-template-columns:1fr}}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <a href="/">AmmanStudio</a>
    <p>Admin Panel</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="/admin" class="{% if request.path=='/admin' %}active{% endif %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <div class="nav-section">Manage</div>
    <a href="/admin/services" class="{% if '/admin/services' in request.path %}active{% endif %}"><i class="fas fa-th-large"></i> Services</a>
    <a href="/admin/bookings" class="{% if '/admin/bookings' in request.path %}active{% endif %}"><i class="fas fa-calendar-check"></i> Bookings</a>
    <a href="/admin/contacts" class="{% if '/admin/contacts' in request.path %}active{% endif %}"><i class="fas fa-envelope"></i> Messages</a>
    <a href="/admin/reviews" class="{% if '/admin/reviews' in request.path %}active{% endif %}"><i class="fas fa-star"></i> Reviews</a>
    <div class="nav-section">Site</div>
    <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    <div class="topbar-right">
      <span class="admin-badge"><i class="fas fa-user-shield"></i> Administrator</span>
    </div>
  </div>
  <div class="content">{% block content %}{% endblock %}</div>
</div>
</body>
</html>
