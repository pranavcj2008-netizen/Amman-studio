<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}Admin{% endblock %} - Amman Studio</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root { --primary:#ff6b35; --dark:#0d0d0d; --card:#1a1a1a; --sidebar:#111; --text:#e0e0e0; --muted:#888; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:var(--dark); color:var(--text); display:flex; min-height:100vh; }
  /* Sidebar */
  .sidebar { width:260px; background:var(--sidebar); min-height:100vh; position:fixed; left:0; top:0; border-right:1px solid rgba(255,255,255,0.05); display:flex; flex-direction:column; z-index:100; }
  .sidebar-logo { padding:28px 24px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .sidebar-logo a { font-size:1.5rem; font-weight:800; color:var(--primary); text-decoration:none; }
  .sidebar-logo a span { color:white; }
  .sidebar-logo p { color:var(--muted); font-size:0.75rem; margin-top:4px; }
  .sidebar-nav { padding:20px 0; flex:1; }
  .nav-section { padding:8px 24px; font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-top:16px; }
  .sidebar-nav a { display:flex; align-items:center; gap:14px; padding:13px 24px; color:var(--muted); text-decoration:none; font-size:0.9rem; font-weight:500; transition:all 0.3s; position:relative; }
  .sidebar-nav a:hover, .sidebar-nav a.active { color:white; background:rgba(255,107,53,0.1); }
  .sidebar-nav a.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--primary); border-radius:0 3px 3px 0; }
  .sidebar-nav a i { width:20px; text-align:center; }
  .badge { background:var(--primary); color:white; font-size:0.7rem; padding:2px 8px; border-radius:50px; margin-left:auto; font-weight:700; }
  .sidebar-footer { padding:20px 24px; border-top:1px solid rgba(255,255,255,0.05); }
  .sidebar-footer a { display:flex; align-items:center; gap:10px; color:var(--muted); text-decoration:none; font-size:0.85rem; transition:color 0.3s; }
  .sidebar-footer a:hover { color:var(--primary); }
  /* Main */
  .main { margin-left:260px; flex:1; min-height:100vh; }
  .topbar { background:var(--card); border-bottom:1px solid rgba(255,255,255,0.05); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .topbar h1 { font-size:1.3rem; font-weight:700; }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .admin-badge { background:rgba(255,107,53,0.15); color:var(--primary); padding:8px 16px; border-radius:50px; font-size:0.85rem; font-weight:600; }
  .content { padding:32px; }
  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; margin-bottom:32px; }
  .stat-card { background:var(--card); border-radius:16px; padding:24px; border:1px solid rgba(255,255,255,0.05); transition:all 0.3s; }
  .stat-card:hover { transform:translateY(-4px); border-color:rgba(255,107,53,0.3); }
  .stat-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; margin-bottom:16px; }
  .stat-num { font-size:2.2rem; font-weight:800; color:white; }
  .stat-label { color:var(--muted); font-size:0.85rem; }
  /* Table */
  .table-card { background:var(--card); border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,0.05); }
  .table-header { padding:20px 28px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:space-between; }
  .table-header h3 { font-size:1.1rem; font-weight:700; }
  table { width:100%; border-collapse:collapse; }
  th { padding:14px 20px; text-align:left; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); }
  td { padding:16px 20px; font-size:0.9rem; border-bottom:1px solid rgba(255,255,255,0.03); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  /* Status badges */
  .status { padding:4px 12px; border-radius:50px; font-size:0.75rem; font-weight:600; }
  .status.pending { background:rgba(255,193,7,0.15); color:#ffc107; }
  .status.confirmed { background:rgba(0,200,83,0.15); color:#00c853; }
  .status.completed { background:rgba(33,150,243,0.15); color:#2196f3; }
  .status.cancelled { background:rgba(255,68,68,0.15); color:#ff4444; }
  /* Forms */
  .form-card { background:var(--card); border-radius:20px; padding:32px; border:1px solid rgba(255,255,255,0.05); margin-bottom:24px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .form-group { margin-bottom:16px; }
  .form-group.full { grid-column:1/-1; }
  .form-group label { display:block; margin-bottom:6px; font-size:0.85rem; font-weight:600; color:var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:12px 16px; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:var(--text);
    font-family:'Poppins',sans-serif; font-size:0.9rem; transition:all 0.3s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(255,107,53,0.1);
  }
  .form-group select option { background:var(--card); }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 22px; border-radius:10px; font-weight:600; font-size:0.85rem; cursor:pointer; border:none; text-decoration:none; transition:all 0.3s; font-family:'Poppins',sans-serif; }
  .btn-primary { background:var(--primary); color:white; }
  .btn-primary:hover { background:#e55a25; }
  .btn-danger { background:rgba(255,68,68,0.15); color:#ff4444; }
  .btn-danger:hover { background:#ff4444; color:white; }
  .btn-success { background:rgba(0,200,83,0.15); color:#00c853; }
  .btn-success:hover { background:#00c853; color:white; }
  .btn-sm { padding:6px 14px; font-size:0.8rem; }
  @media(max-width:768px) { .sidebar{display:none} .main{margin-left:0} .form-grid{grid-template-columns:1fr} }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <a href="/">Amman<span>Studio</span></a>
    <p>Admin Panel</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="/admin" class="{% if request.path=='/admin' %}active{% endif %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <div class="nav-section">Manage</div>
    <a href="/admin/services" class="{% if '/admin/services' in request.path %}active{% endif %}"><i class="fas fa-th-large"></i> Services</a>
    <a href="/admin/bookings" class="{% if '/admin/bookings' in request.path %}active{% endif %}"><i class="fas fa-calendar-check"></i> Bookings</a>
    <a href="/admin/contacts" class="{% if '/admin/contacts' in request.path %}active{% endif %}"><i class="fas fa-envelope"></i> Messages</a>
    <a href="/admin/reviews" class="{% if '/admin/reviews' in request.path %}active{% endif %}"><i class="fas fa-star"></i> Reviews</a>
    <div class="nav-section">Site</div>
    <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    <div class="topbar-right">
      <span class="admin-badge"><i class="fas fa-user-shield"></i> Administrator</span>
    </div>
  </div>
  <div class="content">{% block content %}{% endblock %}</div>
</div>
</body>
</html>
